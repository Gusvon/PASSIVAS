<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leitura das Estrelas 🎀✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        /* Fundo Mágico Animado (Trans Pink Aesthetic) */
        body {
            font-family: 'Nunito', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #a1c4fd, #c2e9fb);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #6d4c5a;
            padding: 20px;
            box-sizing: border-box;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Cartão de Vidro Premium (Glassmorphism) */
        .glass-card {
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 40px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 45px rgba(255, 105, 180, 0.2);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        h1 {
            font-family: 'Fredoka', sans-serif;
            color: #ff3385;
            font-size: 32px;
            margin-top: 0;
            margin-bottom: 5px;
            text-shadow: 2px 2px 0px #ffffff;
        }

        p.subtitle {
            color: #885a6a;
            font-weight: 700;
            font-size: 15px;
            margin-bottom: 30px;
        }

        /* Formulário */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            text-align: left;
        }

        .form-group label {
            font-family: 'Fredoka', sans-serif;
            color: #ff3385;
            font-size: 15px;
            margin-bottom: -5px;
            padding-left: 15px;
        }

        input {
            font-family: 'Nunito', sans-serif;
            padding: 15px 20px;
            border-radius: 25px;
            border: 2px solid #fff;
            background: rgba(255, 255, 255, 0.7);
            font-size: 16px;
            color: #ff3385;
            font-weight: 700;
            outline: none;
            transition: 0.3s;
            box-shadow: inset 0 2px 5px rgba(255, 182, 193, 0.3);
        }

        input:focus {
            border-color: #5bcefa;
            background: #fff;
            box-shadow: 0 0 15px rgba(91, 206, 250, 0.4);
        }

        input::placeholder { color: #ffb6c1; font-weight: 400; }

        /* Botão Mágico */
        button {
            font-family: 'Fredoka', sans-serif;
            margin-top: 15px;
            padding: 18px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, #ff7eb3, #ff758c);
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 10px 25px rgba(255, 117, 140, 0.5);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        button:hover {
            transform: translateY(-5px) scale(1.03);
            box-shadow: 0 15px 35px rgba(255, 117, 140, 0.7);
            background: linear-gradient(135deg, #ff89b9, #ff8096);
        }

        /* Tela de Carregamento */
        #loading {
            display: none;
            padding: 40px 0;
            animation: fadeIn 0.5s;
        }

        .star-spin {
            font-size: 50px;
            animation: spin 1.5s linear infinite;
            display: inline-block;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Resultado (O Plot Twist) */
        #resultado {
            display: none;
            padding: 20px 0;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .punchline {
            font-family: 'Fredoka', sans-serif;
            font-size: 28px;
            color: #ff1493;
            background: rgba(255, 255, 255, 0.9);
            padding: 30px 20px;
            border-radius: 30px;
            border: 3px dashed #ff69b4;
            box-shadow: 0 10px 30px rgba(255, 20, 147, 0.2);
            line-height: 1.4;
        }

        .emoji-big {
            font-size: 40px;
            display: block;
            margin-top: 15px;
        }

        .btn-voltar {
            background: #fff;
            color: #ff7eb3;
            border: 2px solid #ff7eb3;
            font-size: 16px;
            margin-top: 25px;
            padding: 12px 25px;
        }

        .btn-voltar:hover {
            background: #ffe4e1;
            color: #ff1493;
            transform: translateY(-2px);
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="glass-card">
        
        <!-- Tela 1: Formulário -->
        <div id="tela-form">
            <h1>Mapa Astral 🪐✨</h1>
            <p class="subtitle">Descubra os segredos do universo</p>
            
            <div class="form-group">
                <label>Seu nome lindo:</label>
                <input type="text" id="inputNome" placeholder="Ex: Princesa">
                
                <label>Data de Nascimento:</label>
                <input type="date" id="inputData">

                <button onclick="revelarVerdade()">Ler meu futuro 💖</button>
            </div>
        </div>

        <!-- Tela 2: Carregando -->
        <div id="loading">
            <div class="star-spin">✨</div>
            <h2 style="font-family: 'Fredoka'; color: #ff3385;">Consultando os astros... 🔮</h2>
        </div>

        <!-- Tela 3: Resultado / Plot Twist -->
        <div id="resultado">
            <div class="punchline">
                As estrelas mostram:<br>
                <strong>Você é uma safada</strong>
                <span class="emoji-big">💋🔥💅</span>
            </div>
            <button class="btn-voltar" onclick="location.reload()">Fazer mapa de uma amiga 🎀</button>
        </div>

    </div>

    <script>
        function revelarVerdade() {
            const nome = document.getElementById('inputNome').value;
            const data = document.getElementById('inputData').value;

            // Só deixa passar se preencher os dois campos!
            if (!nome || !data) {
                alert("Amor, preenche seu nome e data primeiro para a mágica funcionar! 🙄🎀");
                return;
            }

            // Esconde form, mostra loading
            document.getElementById('tela-form').style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            // Espera 2.5 segundos (pra dar aquele suspense gostoso) e mostra a verdade
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('resultado').style.display = 'block';
            }, 2500);
        }
    </script>

</body>
</html>
